name: iOS-ipa-build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name:  iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get
        working-directory: codigo_aplicacion

      - run: pod repo update
        working-directory: codigo_aplicacion/ios

      # Comando correcto para compilar para dispositivo real sin firmar
      - run: flutter build ios --release --no-codesign
        working-directory: codigo_aplicacion

      # Crear la estructura de empaquetado para iPhone real
      - run: mkdir Payload
        working-directory: codigo_aplicacion/build/ios/iphoneos

      - run: mv Runner.app/ Payload
        working-directory: codigo_aplicacion/build/ios/iphoneos

      - name: Zip output
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: codigo_aplicacion/build/ios/iphoneos

      # Subir a Releases
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: codigo_aplicacion/build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
